spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travel_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:travel_user}
    password: ${DB_PASSWORD:travel1234}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.backend.springbootdeveloper.domain
  configuration:
    map-underscore-to-camel-case: true

jwt:
  issuer: travel-api
  secretKey: ${JWT_SECRET_KEY:my-super-secret-key-for-jwt-token-should-be-at-least-32bytes!}

app:
  secure-cookie: ${APP_SECURE_COOKIE:false}

train:
  api:
    key: ${TRAIN_API_KEY:}

toss:
  secret-key: ${TOSS_SECRET_KEY:test_sk_Z61JOxRQVE1Qmnlbe2d0VW0X9bAq}
  base-url: "https://api.tosspayments.com/v1"

logging:
  level:
    root: info
    org.springframework.web: debug
    org.springframework.jdbc: debug
    java.sql.Connection: debug
    java.sql.Statement: debug
    java.sql.PreparedStatement: debug
    java.sql.ResultSet: debug